<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT-DLP Generator</title>

    <!-- Fonts / Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Light Theme */
            --bg-main: #F0F4F8;
            --bg-card: #FFFFFF;
            --bg-input: #E1E8F0;
            --bg-input-focus: #E1E8F0;
            --bg-chip: #E1E8F0;
            --bg-chip-success: #d9f6e5;
            --bg-chip-error: #ffe1e1;

            --primary: #1E3A8A;
            --primary-dark: #1E3A8A;
            --text-main: #1A202C;
            --text-muted: #64748B;
            --text-soft: #64748B;
            --white-soft: #ffffff;

            --success: #16A34A;
            --error: #DC2626;

            --player-bg: #9D4A6C;
            --player-text: #FFFFFF;

            --icon-bg: #E2E8F0;
            --icon-color: #475569;

            --accent-primary-text: #FFFFFF;

            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.08);
            --radius-xl: 26px;

            /* Toggle specific */
            --toggle-bg: #E2E8F0;
            --toggle-bg-active: var(--primary);
            --toggle-knob: #FFFFFF;
            --toggle-icon: #64748B;
            --toggle-icon-active: #FFFFFF;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-main: #0F141E;
            --bg-card: #171E2E;
            --bg-input: #212A3E;
            --bg-input-focus: #212A3E;
            --bg-chip: #212A3E;
            --bg-chip-success: #07331e;
            --bg-chip-error: #3b1616;

            --primary: #A8C7FA;
            --primary-dark: #A8C7FA;

            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --text-soft: #94A3B8;

            --success: #86EFAC;
            --error: #FCA5A5;

            --player-bg: #7B3450;
            --player-text: #FFFFFF;

            --icon-bg: #212A3E;
            --icon-color: #A8C7FA;

            --accent-primary-text: #051B44;

            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.55);

            /* Toggle specific */
            --toggle-bg: #212A3E;
            --toggle-bg-active: var(--primary);
            --toggle-knob: #FFFFFF;
            --toggle-icon: #94A3B8;
            --toggle-icon-active: #051B44;
        }

        *{margin:0;padding:0;box-sizing:border-box;}

        html,body{height:100%;}

        body{
            font-family: 'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text",
                         "Segoe UI",Roboto,sans-serif;
            background: radial-gradient(circle at top left,#f5f7ff 0,var(--bg-main) 40%);
            color:var(--text-main);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        [data-theme="dark"] body {
            background: var(--bg-main);
        }

        .material-symbols-rounded{
            font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
        }

        .material-symbols-rounded.filled{
            font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
        }

        /* MAIN LAYOUT */
        .app{
            width:100%;
            max-width:640px;
            margin:40px auto;
            display:flex;
            flex-direction:column;
            gap:26px;
            padding:32px 24px 40px;
        }

        /* HEADER */
        .header{
            position:relative;
            display:flex;
            flex-direction:column;
            gap:8px;
            padding:0;
            align-items:flex-start;
        }

        .logo-box{display:none;}

        .header-info{flex:none;}

        .title{
            font-size:2.8rem;
            line-height:1.05;
            letter-spacing:-0.04em;
            font-weight:700;
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
        }

        .subtitle{
            margin-top:6px;
            font-size:0.95rem;
            color:var(--text-muted);
            font-weight:400;
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
        }

        /* Header buttons container */
        .header-buttons{
            position:absolute;
            top:0;
            right:0;
            display:flex;
            align-items:center;
            gap:12px;
        }

        .icon-btn{
            width:44px;
            height:44px;
            border-radius:50%;
            border:none;
            background:var(--bg-card);
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 10px 30px rgba(15,23,42,0.12);
            cursor:pointer;
            color:var(--text-main);
            transition:transform .15s,box-shadow .15s,background .15s;
        }
        .icon-btn:hover{
            transform:translateY(-1px);
            box-shadow:0 12px 34px rgba(15,23,42,0.16);
        }

        /* MODE TOGGLE */
        .mode-toggle{
            display:flex;
            align-items:center;
            background:var(--bg-card);
            border-radius:50px;
            padding:5px;
            box-shadow:0 10px 30px rgba(15,23,42,0.12);
            gap:4px;
        }

        .mode-btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:6px;
            padding:8px 14px;
            border-radius:50px;
            border:none;
            background:transparent;
            color:var(--text-muted);
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
            font-size:0.82rem;
            font-weight:600;
            cursor:pointer;
            transition:all .2s ease;
        }

        .mode-btn .material-symbols-rounded{
            font-size:18px;
            transition:all .2s ease;
        }

        .mode-btn.active{
            background:var(--primary);
            color:var(--accent-primary-text);
            box-shadow:0 4px 12px rgba(30,58,138,0.3);
        }

        [data-theme="dark"] .mode-btn.active{
            box-shadow:0 4px 12px rgba(168,199,250,0.3);
        }

        .mode-btn:not(.active):hover{
            background:var(--bg-input);
            color:var(--text-main);
        }

        /* Mode indicator chip */
        .mode-chip{
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:5px 12px;
            border-radius:12px;
            background:var(--bg-chip);
            font-size:.75rem;
            font-weight:600;
            color:var(--text-muted);
            margin-left:8px;
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
        }

        .mode-chip.music{
            background:var(--primary);
            color:var(--accent-primary-text);
        }

        .mode-chip.video{
            background:var(--primary);
            color:var(--accent-primary-text);
        }

        .mode-chip .material-symbols-rounded{
            font-size:14px;
        }

        /* CARDS */
        .card{
            background:var(--bg-card);
            border-radius:var(--radius-xl);
            padding:22px 22px 20px;
            box-shadow:var(--shadow-soft);
            border:1px solid rgba(148,163,184,0.12);
        }

        /* INPUT CARD */
        .input-row{
            display:flex;
            align-items:center;
            gap:14px;
            margin-bottom:16px;
        }

        .input-icon{
            width:40px;
            height:40px;
            border-radius:16px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:var(--icon-bg);
            color:var(--primary);
        }
        [data-theme="dark"] .input-icon{
            background:var(--icon-bg);
            color:var(--icon-color);
        }
        .input-icon .material-symbols-rounded{
            font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 24;
            font-size:20px;
        }

        .input-text{flex:1;}

        .input-label{
            display:flex;
            align-items:center;
            font-size:.92rem;
            font-weight:600;
            color:var(--text-main);
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
        }

        .input-hint{
            font-size:.8rem;
            margin-top:2px;
            color:var(--text-soft);
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
        }

        .input-field{
            width:100%;
            margin-top:4px;
            padding:13px 18px;
            font-size:.95rem;
            font-weight:500;
            border-radius:18px;
            border:none;
            background:var(--bg-input);
            color:var(--text-main);
            outline:none;
            cursor:pointer;
            transition:background .15s,box-shadow .15s,transform .06s;
            box-shadow:inset 0 0 0 1px rgba(148,163,184,.45);
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
        }
        .input-field:focus{
            background:var(--bg-input-focus);
            box-shadow:inset 0 0 0 2px var(--primary);
            transform:translateY(-.5px);
        }
        .input-field::placeholder{color:var(--text-soft);}

        /* STATUS CHIP */
        .status-chip{
            display:inline-flex;
            align-items:center;
            gap:8px;
            margin-top:16px;
            padding:7px 14px;
            border-radius:16px;
            background:var(--bg-chip);
            font-size:.78rem;
            font-weight:600;
            color:var(--text-muted);
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
        }
        .status-chip.success{
            background:var(--bg-chip-success);
            color:var(--success);
        }
        .status-chip.error{
            background:var(--bg-chip-error);
            color:var(--error);
        }
        .status-chip .material-symbols-rounded{font-size:18px;}

        /* OUTPUT CARD */
        .output-card{
            display:flex;
            flex-direction:column;
            gap:12px;
            padding-bottom:20px;
        }

        .output-header{
            display:flex;
            align-items:center;
            justify-content:flex-start;
            gap:10px;
            margin-bottom:6px;
        }

        .output-title{
            display:flex;
            align-items:center;
            gap:10px;
            flex:1;
        }

        .output-icon{
            width:40px;
            height:40px;
            border-radius:16px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:var(--icon-bg);
            color:var(--primary);
        }
        [data-theme="dark"] .output-icon{
            background:var(--icon-bg);
            color:var(--icon-color);
        }

        .output-label{
            font-size:.92rem;
            font-weight:600;
            color:var(--text-main);
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
        }

        /* COPY BUTTON */
        .copy-btn{
            margin-top:16px;
            width:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;

            padding:15px 26px;
            border-radius:9999px;
            border:none;

            background:var(--primary);
            color:var(--accent-primary-text);
            box-shadow:0 18px 40px rgba(15,23,42,0.45);

            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
            font-size:.95rem;
            font-weight:700;
            letter-spacing:.02em;

            cursor:pointer;
            transition:background .14s ease, transform .08s ease, box-shadow .14s ease;
        }

        .copy-btn .material-symbols-rounded{
            font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 20;
            font-size:18px;
            color:var(--accent-primary-text);
        }

        .copy-btn:hover{
            transform:translateY(-1px);
            box-shadow:0 22px 48px rgba(15,23,42,0.50);
        }
        .copy-btn:active{
            transform:translateY(0);
            box-shadow:0 12px 30px rgba(15,23,42,0.42);
        }
        .copy-btn.copied{
            background:var(--success);
            color:#000000;
            box-shadow:0 18px 42px rgba(22,163,74,.50);
        }
        .copy-btn.copied .material-symbols-rounded{
            color:#000000;
        }

        .command-box{
            width:100%;
            min-height:80px;
            margin-top:2px;
            padding:13px 18px;
            border-radius:18px;
            border:none;
            background:var(--bg-input);
            color:var(--primary);
            font-family:monospace;
            font-size:.84rem;
            line-height:1.7;
            resize:vertical;
            outline:none;
            box-shadow:inset 0 0 0 1px rgba(148,163,184,.45);
        }
        .command-box::placeholder{
            color:var(--text-soft);
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
            font-size:1rem;
        }

        /* SNACKBAR */
        .snackbar{
            position:fixed;
            bottom:32px;
            left:50%;
            transform:translateX(-50%) translateY(80px);
            padding:14px 20px;
            border-radius:28px;
            display:flex;
            align-items:center;
            gap:12px;
            background:var(--player-bg);
            color:var(--player-text);
            font-size:.95rem;
            font-weight:600;
            box-shadow:0 14px 40px rgba(15,23,42,.7);
            opacity:0;
            pointer-events:none;
            transition:opacity .5s cubic-bezier(0.34, 1.56, 0.64, 1),transform .5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index:40;
            font-family:'Outfit', system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
        }
        .snackbar.show{
            opacity:1;
            transform:translateX(-50%) translateY(0);
        }
        .snackbar-icon-wrap{
            width:40px;
            height:40px;
            background:rgba(255,255,255,0.2);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .snackbar .material-symbols-rounded{
            color:var(--player-text);
            font-size:20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar{width:6px;height:6px;}
        ::-webkit-scrollbar-thumb{
            background:rgba(148,163,184,.7);
            border-radius:999px;
        }

        /* Responsive */
        @media (max-width:768px){
            body{align-items:flex-start;}
            .app{margin-top:24px;padding:24px 16px 32px;}
            .title{font-size:2.2rem;}
        }
        @media (max-width:480px){
            .app{margin:12px auto 24px;}
            .title{font-size:1.9rem;}
            .card{padding:18px 16px 16px;}
            .input-field,.command-box{font-size:16px;}
            .mode-toggle{
                padding:4px;
            }
            .mode-btn{
                padding:6px 10px;
                font-size:0.75rem;
            }
            .mode-btn span.mode-text{
                display:none;
            }
            .header-buttons{
                gap:8px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo-box">
                <span class="material-symbols-rounded">play_arrow</span>
            </div>
            <div class="header-info">
                <h1 class="title">YT-DLP<br>Generator</h1>
                <p class="subtitle">Tap to paste • Auto-copy</p>
            </div>
            <div class="header-buttons">
                <!-- Mode Toggle -->
                <div class="mode-toggle">
                    <button class="mode-btn active" id="musicBtn" onclick="setMode('music')">
                        <span class="material-symbols-rounded">music_note</span>
                        <span class="mode-text">Music</span>
                    </button>
                    <button class="mode-btn" id="videoBtn" onclick="setMode('video')">
                        <span class="material-symbols-rounded">videocam</span>
                        <span class="mode-text">Video</span>
                    </button>
                </div>
                <!-- Theme Toggle -->
                <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">
                    <span class="material-symbols-rounded" id="themeIcon">dark_mode</span>
                </button>
            </div>
        </header>

        <!-- Input Card -->
        <div class="card">
            <div class="input-row">
                <div class="input-icon">
                    <span class="material-symbols-rounded">link</span>
                </div>
                <div class="input-text">
                    <div class="input-label">
                        YouTube URL
                        <span class="mode-chip music" id="modeChip">
                            <span class="material-symbols-rounded" id="modeChipIcon">music_note</span>
                            <span id="modeChipText">Music</span>
                        </span>
                    </div>
                    <div class="input-hint">Tap below to auto‑paste</div>
                </div>
            </div>
            <input 
                type="text" 
                id="urlInput" 
                class="input-field" 
                placeholder="Tap here to paste link..."
                readonly
                onclick="autoPaste()"
            >
            <div class="status-chip" id="statusChip">
                <span class="material-symbols-rounded" id="statusIcon">hourglass_empty</span>
                <span id="statusText">Waiting for URL</span>
            </div>
        </div>

        <!-- Output Card -->
        <div class="card output-card">
            <div class="output-header">
                <div class="output-title">
                    <div class="output-icon">
                        <span class="material-symbols-rounded">terminal</span>
                    </div>
                    <span class="output-label">Command Output</span>
                </div>
            </div>
            <textarea 
                id="commandOutput" 
                class="command-box" 
                readonly 
                placeholder="Generated command will appear here..."
            ></textarea>

            <button class="copy-btn" id="copyBtn" onclick="manualCopy()">
                <span class="material-symbols-rounded" id="copyIcon">content_copy</span>
                <span id="copyText">Copy Command</span>
            </button>
        </div>
    </div>

    <!-- Snackbar -->
    <div class="snackbar" id="snackbar">
        <div class="snackbar-icon-wrap">
            <span class="material-symbols-rounded">check</span>
        </div>
        <span id="snackbarText">Copied!</span>
    </div>

    <script>
        // Current mode: 'music' or 'video'
        let currentMode = localStorage.getItem('downloadMode') || 'music';

        // Initialize mode on load
        (function initMode() {
            setMode(currentMode, false);
        })();

        // Set download mode
        function setMode(mode, regenerate = true) {
            currentMode = mode;
            localStorage.setItem('downloadMode', mode);

            // Update toggle buttons
            const musicBtn = document.getElementById('musicBtn');
            const videoBtn = document.getElementById('videoBtn');
            
            if (mode === 'music') {
                musicBtn.classList.add('active');
                videoBtn.classList.remove('active');
            } else {
                videoBtn.classList.add('active');
                musicBtn.classList.remove('active');
            }

            // Update mode chip
            const modeChip = document.getElementById('modeChip');
            const modeChipIcon = document.getElementById('modeChipIcon');
            const modeChipText = document.getElementById('modeChipText');

            if (mode === 'music') {
                modeChip.className = 'mode-chip music';
                modeChipIcon.textContent = 'music_note';
                modeChipText.textContent = 'Music';
            } else {
                modeChip.className = 'mode-chip video';
                modeChipIcon.textContent = 'videocam';
                modeChipText.textContent = 'Video 720p';
            }

            // Regenerate command if URL exists
            if (regenerate) {
                const url = document.getElementById('urlInput').value;
                if (url) {
                    generateAndCopy(url);
                }
            }
        }

        // Theme
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').textContent = isDark ? 'dark_mode' : 'light_mode';
        }

        (function loadTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('themeIcon').textContent = saved === 'dark' ? 'light_mode' : 'dark_mode';
        })();

        // Strict YouTube URL validation
        function isValidYouTubeURL(url) {
            if (!url) return false;
            
            // Must start with http:// or https://
            // Must be from youtube.com, youtu.be, or music.youtube.com
            // Must have valid path patterns (watch, playlist, shorts, embed, or video ID for youtu.be)
            const pattern = /^https?:\/\/(www\.)?(youtube\.com\/(watch\?|playlist\?|shorts\/|embed\/|v\/)|youtu\.be\/[a-zA-Z0-9_-]+|music\.youtube\.com\/(watch\?|playlist\?))/i;
            
            return pattern.test(url);
        }

        // Auto-paste
        async function autoPaste() {
            try {
                const text = await navigator.clipboard.readText();
                
                if (!text || !text.trim()) {
                    updateStatus('error', 'error', 'Clipboard is empty');
                    return;
                }

                const trimmedText = text.trim();

                // Check for poisoned clipboard (command instead of URL)
                if (trimmedText.toLowerCase().startsWith('yt-dlp')) {
                    updateStatus('error', 'error', 'Clipboard has command, not URL');
                    return;
                }

                // Strict YouTube URL validation
                if (isValidYouTubeURL(trimmedText)) {
                    document.getElementById('urlInput').value = trimmedText;
                    generateAndCopy(trimmedText);
                } else {
                    updateStatus('error', 'error', 'Not a valid YouTube URL');
                }
            } catch {
                updateStatus('error', 'lock', 'Allow clipboard access');
            }
        }

        // Generate + Auto-copy
        function generateAndCopy(url) {
            const isPlaylist = /[?&]list=/i.test(url);
            
            let cmd = 'yt-dlp';
            cmd += isPlaylist ? ' --yes-playlist' : ' --no-playlist';
            
            if (currentMode === 'music') {
                // Music mode - MP3 audio
                cmd += ' -x --audio-format mp3 --audio-quality 0';
                cmd += ' --embed-thumbnail --embed-metadata --add-metadata';
                cmd += isPlaylist 
                    ? ' -o "C:/Users/Goutam/Music/%(playlist_title)s/%(title)s.%(ext)s"'
                    : ' -o "C:/Users/Goutam/Music/%(title)s.%(ext)s"';
                cmd += ' --download-archive "C:/Users/Goutam/Music/downloaded.txt"';
            } else {
                // Video mode - 720p MP4
                cmd += ' -f "bestvideo[height<=720]+bestaudio/best[height<=720]"';
                cmd += ' --merge-output-format mp4';
                cmd += ' --embed-thumbnail --embed-metadata --add-metadata';
                cmd += isPlaylist 
                    ? ' -o "C:/Users/Goutam/Documents/Padhai/%(playlist_title)s/%(title)s.%(ext)s"'
                    : ' -o "C:/Users/Goutam/Documents/Padhai/%(title)s.%(ext)s"';
                cmd += ' --download-archive "C:/Users/Goutam/Documents/Padhai/downloaded.txt"';
            }
            
            cmd += ` "${url}"`;

            const textarea = document.getElementById('commandOutput');
            textarea.value = cmd;

            // Copy using fallback method
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            
            try {
                document.execCommand('copy');
                const type = isPlaylist ? 'Playlist' : (currentMode === 'music' ? 'Track' : 'Video');
                const modeLabel = currentMode === 'music' ? '🎵' : '🎬';
                updateStatus('success', 'check_circle', `${type} ${modeLabel} Copied!`);
                showCopied();
                showSnackbar('Command copied!');
            } catch {
                navigator.clipboard.writeText(cmd).then(() => {
                    const type = isPlaylist ? 'Playlist' : (currentMode === 'music' ? 'Track' : 'Video');
                    const modeLabel = currentMode === 'music' ? '🎵' : '🎬';
                    updateStatus('success', 'check_circle', `${type} ${modeLabel} Copied!`);
                    showCopied();
                    showSnackbar('Command copied!');
                }).catch(() => {
                    updateStatus('', 'info', 'Tap Copy to copy');
                });
            }
            
            window.getSelection().removeAllRanges();
        }

        // Manual copy
        async function manualCopy() {
            const cmd = document.getElementById('commandOutput').value;
            if (!cmd) return;

            try {
                await navigator.clipboard.writeText(cmd);
                showCopied();
                showSnackbar('Copied!');
            } catch {
                document.getElementById('commandOutput').select();
                document.execCommand('copy');
                showCopied();
                showSnackbar('Copied!');
            }
        }

        function updateStatus(type, icon, text) {
            const chip = document.getElementById('statusChip');
            chip.className = 'status-chip' + (type ? ' ' + type : '');
            document.getElementById('statusIcon').textContent = icon;
            document.getElementById('statusText').textContent = text;
        }

        function showCopied() {
            const btn = document.getElementById('copyBtn');
            btn.classList.add('copied');
            document.getElementById('copyIcon').textContent = 'check';
            document.getElementById('copyText').textContent = 'Copied';

            setTimeout(() => {
                btn.classList.remove('copied');
                document.getElementById('copyIcon').textContent = 'content_copy';
                document.getElementById('copyText').textContent = 'Copy Command';
            }, 2500);
        }

        function showSnackbar(msg) {
            const snackbar = document.getElementById('snackbar');
            document.getElementById('snackbarText').textContent = msg;
            snackbar.classList.add('show');
            setTimeout(() => snackbar.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
